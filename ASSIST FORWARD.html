<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ASSIST FORWARD — 本部管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600;1,700;1,800&family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ========================================================================
   ASSIST FORWARD — admin platform prototype
   Design tokens extracted from product screenshots
   ======================================================================== */
:root{
  --brand-red:#ee3124;
  --brand-red-dark:#cf2417;
  --sidebar-bg:#0b1120;
  --sidebar-border:rgba(255,255,255,.06);
  --sidebar-label:#5b6577;
  --sidebar-item:#aeb6c4;
  --topbar-h:64px;
  --sidebar-w:230px;

  --bg:#f5f6f8;
  --card:#ffffff;
  --ink:#1d2738;
  --ink-soft:#46536b;
  --muted:#94a1b6;
  --muted-2:#aab3c2;
  --line:#eef0f4;
  --line-2:#e4e8ef;

  --navy:#111a2c;
  --navy-2:#0d1626;

  --green:#16a34a;
  --green-bg:#dcfce7;
  --green-soft:#e9f9ef;
  --blue:#2563eb;
  --blue-bg:#eef4ff;
  --amber:#d97706;
  --amber-bg:#fff4e2;
  --purple:#7c3aed;
  --purple-bg:#f3ecff;

  --radius:20px;
  --radius-sm:13px;
  --shadow-card:0 1px 2px rgba(16,24,40,.04), 0 10px 30px -18px rgba(16,24,40,.18);
  --shadow-pop:0 24px 60px -22px rgba(8,15,30,.45);

  --font:"Inter","Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","Yu Gothic UI",system-ui,sans-serif;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
input,select,textarea{font-family:inherit;}
a{color:inherit;text-decoration:none;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:#cdd4df;border-radius:20px;border:3px solid var(--bg);}
::-webkit-scrollbar-track{background:transparent;}

.italic{font-style:italic;}

/* ============================ APP LAYOUT ============================ */
.app-shell{display:flex;min-height:100vh;}

/* ---------- Sidebar ---------- */
.sidebar{
  width:var(--sidebar-w);
  background:var(--sidebar-bg);
  color:var(--sidebar-item);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;bottom:0;z-index:40;
  border-right:1px solid var(--sidebar-border);
}
.sidebar__brand{
  padding:18px 20px 16px;
  border-bottom:1px solid var(--sidebar-border);
  position:relative;
}
.sidebar__brand::before{
  content:"";position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#6e2018,#b6321f,#7a2418);
}
.brand-logo{
  font-style:italic;font-weight:800;letter-spacing:.5px;
  color:var(--brand-red);font-size:20px;line-height:1;
}
.brand-sub{color:#7c8595;font-size:9.5px;letter-spacing:1px;margin-top:5px;}

.sidebar__section{color:var(--sidebar-label);font-size:11px;letter-spacing:1px;
  padding:18px 22px 8px;font-weight:600;}
.sidebar__nav{flex:1;overflow-y:auto;padding:0 12px;}
.nav-item{
  display:flex;align-items:center;gap:13px;
  padding:11px 14px;margin:3px 0;border-radius:11px;
  color:var(--sidebar-item);font-size:14.5px;font-weight:600;
  transition:background .15s,color .15s;position:relative;
}
.nav-item i{font-size:19px;width:22px;text-align:center;color:#8b94a4;transition:color .15s;}
.nav-item:hover{background:rgba(255,255,255,.05);color:#fff;}
.nav-item:hover i{color:#cfd5df;}
.nav-item.active{background:var(--brand-red);color:#fff;box-shadow:0 8px 18px -8px rgba(238,49,36,.7);}
.nav-item.active i{color:#fff;}
.nav-item .nav-badge{
  margin-left:auto;background:var(--brand-red);color:#fff;
  font-size:11px;font-weight:700;min-width:20px;height:20px;border-radius:20px;
  display:flex;align-items:center;justify-content:center;padding:0 5px;
}
.nav-item.active .nav-badge{background:#fff;color:var(--brand-red);}
.sidebar__foot{border-top:1px solid var(--sidebar-border);padding:14px 18px;}
.logout-btn{display:flex;align-items:center;gap:13px;color:var(--brand-red);
  font-weight:700;font-size:14.5px;width:100%;padding:8px 8px;}
.logout-btn i{font-size:19px;}

/* ---------- Main column ---------- */
.main{flex:1;margin-left:var(--sidebar-w);display:flex;flex-direction:column;min-width:0;}
.topbar{
  height:var(--topbar-h);background:#fff;border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:14px;padding:0 28px;position:sticky;top:0;z-index:30;
}
.topbar__title{font-weight:700;font-size:16px;color:var(--ink);}
.topbar__divider{width:1px;height:22px;background:var(--line-2);}
.conn-badge{
  display:inline-flex;align-items:center;gap:6px;background:var(--green-soft);
  color:var(--green);font-size:12px;font-weight:600;padding:5px 11px;border-radius:20px;
}
.conn-badge i{font-size:14px;}
.topbar__spacer{flex:1;}
.icon-btn{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;
  justify-content:center;color:#64708a;font-size:20px;transition:background .15s;}
.icon-btn:hover{background:var(--line);}
.userchip{display:flex;align-items:center;gap:10px;padding-left:6px;}
.avatar-sm{width:34px;height:34px;border-radius:50%;background:#e7ebf2;color:#475569;
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}
.userchip__name{font-size:14px;font-weight:700;color:var(--ink);line-height:1.1;}
.userchip__role{font-size:11px;color:var(--muted);}
.userchip i{color:#9aa6ba;font-size:16px;}
.lang-toggle{display:flex;background:#f1f4f8;border-radius:10px;padding:3px;gap:3px;}
.lang-toggle button{padding:6px 12px;border-radius:7px;font-size:12px;font-weight:700;color:#94a1b6;font-style:italic;transition:background .12s,color .12s;}
.lang-toggle button.on{background:#0c1322;color:#fff;}
.login-lang{position:absolute;top:26px;right:30px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);}
.login-lang button{color:#aeb6c8;}
.login-lang button.on{background:#fff;color:#0c1322;}

.page{padding:34px 40px 60px;max-width:1640px;width:100%;margin:0 auto;}

/* ---------- Headings ---------- */
.page-title{font-style:italic;font-weight:800;font-size:30px;color:var(--ink);margin:0;letter-spacing:.3px;}
.page-sub{color:var(--muted);font-size:14px;margin-top:6px;}
.page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:26px;}

/* ---------- Buttons ---------- */
.btn{display:inline-flex;align-items:center;gap:8px;border-radius:12px;font-weight:700;
  font-size:14px;padding:11px 18px;transition:transform .1s,box-shadow .15s,background .15s;}
.btn:active{transform:translateY(1px);}
.btn-red{background:var(--brand-red);color:#fff;box-shadow:0 12px 22px -12px rgba(238,49,36,.8);}
.btn-red:hover{background:var(--brand-red-dark);}
.btn-navy{background:var(--navy);color:#fff;}
.btn-navy:hover{background:#1b2742;}
.btn-light{background:#fff;color:var(--ink);border:1px solid var(--line-2);font-weight:600;}
.btn-light:hover{background:#f8fafc;}
.btn-sm{padding:8px 16px;font-size:13px;border-radius:10px;}

/* ---------- KPI cards ---------- */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:22px;}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:22px 24px;box-shadow:var(--shadow-card);display:flex;justify-content:space-between;align-items:flex-start;}
.kpi__label{font-size:13px;color:var(--muted);font-weight:600;font-style:italic;}
.kpi__value{font-size:30px;font-weight:800;font-style:italic;color:var(--ink);margin-top:14px;letter-spacing:.5px;}
.kpi__icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:21px;}
.ico-blue{background:#e8f0fe;color:#2f6fed;}
.ico-amber{background:#fef3d7;color:#e0a008;}
.ico-green{background:#dcfce7;color:#16a34a;}
.ico-purple{background:#f1e9ff;color:#8b3df0;}

/* ---------- Chart panel ---------- */
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow-card);padding:24px 26px;}
.panel__title{font-style:italic;font-weight:700;font-size:13px;letter-spacing:1px;color:var(--ink-soft);text-transform:uppercase;}
.panel__title.jp{text-transform:none;font-size:15px;letter-spacing:0;}
.chart-2col{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:24px;}
.nodata{height:330px;display:flex;align-items:center;justify-content:center;color:#c4ccd8;
  font-size:13px;letter-spacing:2px;font-style:italic;}

/* ---------- Search / filter bar ---------- */
.searchbar{background:#fff;border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow-card);padding:20px 24px;margin-bottom:22px;}
.search-row{display:flex;gap:14px;align-items:stretch;}
.input{display:flex;align-items:center;gap:10px;background:#f4f6f9;border:1px solid #eceff4;
  border-radius:13px;padding:0 16px;height:50px;color:var(--ink);font-size:14px;flex:1;}
.input i{color:#aab3c2;font-size:18px;}
.input input{border:none;background:none;outline:none;flex:1;font-size:14px;color:var(--ink);}
.input input::placeholder{color:#aab3c2;}
.input.pill{border-radius:28px;}
.input--code{flex:none;width:200px;}
.input--code i{color:var(--brand-red);}
.sort-btn{background:var(--navy);color:#fff;border-radius:13px;padding:0 20px;height:50px;
  display:flex;align-items:center;gap:10px;font-weight:700;font-size:13.5px;}
.sort-btn i{font-size:16px;}
.filter-row{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-top:18px;}
.field label{display:block;font-size:11.5px;color:var(--muted);margin-bottom:7px;font-weight:600;}
.select{position:relative;}
.select select{width:100%;height:46px;border:1px solid var(--line-2);border-radius:12px;
  background:#fff;padding:0 38px 0 14px;font-size:13.5px;color:var(--ink-soft);appearance:none;cursor:pointer;font-weight:600;}
.select::after{content:"\\ea5f";font-family:"tabler-icons";position:absolute;right:13px;top:50%;
  transform:translateY(-50%);color:#9aa6ba;pointer-events:none;font-size:15px;}

/* ---------- Data table (card style) ---------- */
.table-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow-card);overflow:hidden;border:1px solid var(--line);}
.thead{background:var(--navy);color:#aab4c6;display:grid;align-items:center;
  padding:16px 26px;font-size:12px;font-weight:600;letter-spacing:.5px;}
.thead.rounded{margin:0;border-radius:16px 16px 0 0;}
.trow{display:grid;align-items:center;padding:18px 26px;border-bottom:1px solid var(--line);
  transition:background .12s;font-size:14px;}
.trow:last-child{border-bottom:none;}
.trow:hover{background:#fafbfc;}
.cell-strong{font-weight:700;font-style:italic;color:var(--ink);}
.cell-sub{font-size:11.5px;color:var(--muted);margin-top:3px;}
.tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;
  padding:3px 9px;border-radius:7px;font-style:italic;}
.tag-r8{background:#eef1f6;color:#5b6679;}
.tag-blue{background:var(--blue-bg);color:var(--blue);}
.tag-amber{background:var(--amber-bg);color:var(--amber);}
.tag-green{background:var(--green-bg);color:var(--green);}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
.dot-green{background:#22c55e;}
.status-pill{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:var(--green);}
.muted{color:var(--muted);}
.thumb{width:64px;height:46px;border-radius:9px;overflow:hidden;display:flex;align-items:center;
  justify-content:center;background:linear-gradient(135deg,#dfe5ee,#c7d0de);color:#8e9aab;}
.thumb i{font-size:22px;color:#9aa6b8;}

.status-select{position:relative;display:inline-block;}
.status-select select{appearance:none;background:var(--green-bg);color:var(--green);
  border:none;border-radius:9px;padding:7px 30px 7px 14px;font-size:13px;font-weight:700;cursor:pointer;}
.status-select::after{content:"\\ea5f";font-family:"tabler-icons";position:absolute;right:9px;top:50%;
  transform:translateY(-50%);color:var(--green);pointer-events:none;font-size:14px;}
.notif-ic{width:34px;height:34px;border-radius:9px;background:#f1f4f8;color:#b3bdcc;
  display:inline-flex;align-items:center;justify-content:center;font-size:16px;}
.row-actions{display:flex;gap:6px;justify-content:flex-end;}
.iconlink{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  color:#aab3c2;font-size:17px;transition:background .12s,color .12s;}
.iconlink:hover{background:var(--line);color:var(--ink-soft);}

.list-foot{padding:18px 26px;color:var(--muted);font-size:13px;font-style:italic;display:flex;
  align-items:center;justify-content:space-between;background:#fff;border-radius:0 0 var(--radius) var(--radius);
  box-shadow:var(--shadow-card);margin-top:14px;border:1px solid var(--line);}
.pager{display:flex;gap:8px;}
.pager button{width:34px;height:34px;border-radius:50%;border:1px solid var(--line-2);
  color:#9aa6ba;display:flex;align-items:center;justify-content:center;background:#fff;}
.pager button:hover{background:#f4f6f9;}

/* ---------- segmented filter (master review) ---------- */
.seg{display:inline-flex;gap:8px;}
.seg button{padding:9px 18px;border-radius:11px;font-size:13px;font-weight:700;font-style:italic;
  color:var(--muted);border:1px solid transparent;}
.seg button.on{background:var(--brand-red);color:#fff;box-shadow:0 10px 20px -12px rgba(238,49,36,.8);}
.seg button:not(.on):hover{background:#fff;color:var(--ink-soft);border-color:var(--line-2);}

/* ---------- avatar list ---------- */
.avatar-row{display:flex;align-items:center;gap:13px;}
.avatar-md{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;color:#fff;flex:none;}
.shop-ic{width:38px;height:38px;border-radius:11px;background:#eef1f6;color:#8794a8;
  display:flex;align-items:center;justify-content:center;font-size:18px;flex:none;}
.contact-line{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--ink-soft);}
.contact-line i{font-size:14px;color:#aab3c2;}
.contact-line.mail{margin-top:5px;color:var(--muted);}

/* ============================ LOGIN ============================ */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(1200px 600px at 22% 30%,#2a2540 0%,transparent 55%),linear-gradient(160deg,#141a2c 0%,#11162a 55%,#0e1322 100%);
  position:relative;padding:40px 20px;}
.login-wrap::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,#5a1f18,#aa3320,#5a1f18);}
.login-brand{font-style:italic;font-weight:800;color:#fff;font-size:54px;letter-spacing:1px;text-align:center;}
.login-tag{margin:18px auto 0;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  color:#aeb6c8;font-size:12px;letter-spacing:3px;padding:8px 22px;border-radius:30px;}
.login-card{background:#fff;border-radius:30px;padding:46px 44px;width:400px;margin-top:48px;
  box-shadow:0 40px 80px -30px rgba(0,0,0,.6);}
.login-card h2{text-align:center;font-style:italic;font-weight:800;font-size:26px;margin:0 0 30px;color:#0e1322;}
.fieldset{margin-bottom:20px;}
.fieldset label{display:block;font-size:13px;color:#94a1b6;margin-bottom:9px;}
.login-input{width:100%;height:54px;border-radius:14px;border:1px solid #e7ebf2;background:#f6f8fc;
  padding:0 18px;font-size:15px;font-weight:600;color:#0e1322;outline:none;}
.login-input:focus{border-color:#c3d0ef;background:#fff;}
.login-input.filled{background:#e9eefb;}
.login-submit{width:100%;height:56px;border-radius:14px;background:#0c1322;color:#fff;
  font-style:italic;font-weight:800;font-size:16px;display:flex;align-items:center;justify-content:center;gap:9px;margin-top:8px;}
.login-submit:hover{background:#161f36;}
.login-submit .dot-red{width:7px;height:7px;border-radius:50%;background:var(--brand-red);}
.login-foot{margin-top:30px;}
.login-links{color:#8893a8;font-size:12px;letter-spacing:1px;display:flex;gap:14px;justify-content:center;}
.login-links span{color:#3a465e;}
.login-copy{color:#3b465e;font-size:10px;letter-spacing:2px;text-align:center;margin-top:14px;line-height:1.7;}

/* ============================ VEHICLE DETAIL ============================ */
.detail-head{display:flex;align-items:center;gap:18px;margin-bottom:22px;}
.back-btn{width:48px;height:48px;border-radius:14px;background:#fff;border:1px solid var(--line-2);
  display:flex;align-items:center;justify-content:center;color:#5b6679;font-size:22px;box-shadow:var(--shadow-card);}
.back-btn:hover{background:#f8fafc;}
.detail-actions{margin-left:auto;display:flex;gap:12px;}

.tabs-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow-card);border:1px solid var(--line);overflow:hidden;}
.tabs{display:flex;border-bottom:1px solid var(--line);padding:6px 8px 0;gap:4px;background:#fcfcfd;}
.tab{display:flex;align-items:center;gap:8px;padding:16px 26px;font-size:14px;font-weight:700;
  color:var(--muted);position:relative;border-radius:10px 10px 0 0;}
.tab i{font-size:17px;}
.tab:hover{color:var(--ink-soft);}
.tab.active{color:var(--ink);}
.tab.active::after{content:"";position:absolute;left:14px;right:14px;top:0;height:3px;
  background:var(--brand-red);border-radius:3px;}
.tab-body{padding:30px;}

.spec-card{background:#fff;border:1px solid var(--line-2);border-radius:18px;padding:24px;}
.spec-card__head{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.spec-card__head .ic{width:34px;height:34px;border-radius:10px;background:#fdecea;color:var(--brand-red);
  display:flex;align-items:center;justify-content:center;font-size:18px;}
.spec-card__head h3{margin:0;font-size:16px;font-weight:800;font-style:italic;color:var(--ink);}
.spec-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px 30px;}
.spec-grid.three{grid-template-columns:repeat(3,1fr);}
.spec dt{font-size:11.5px;color:var(--muted);font-style:italic;margin-bottom:5px;}
.spec dd{margin:0;font-size:16px;font-weight:700;color:var(--ink);}
.divider{height:1px;background:var(--line);margin:18px 0;}

.price-box{background:linear-gradient(135deg,#eef3ff,#e6edfb);border-radius:18px;padding:22px 24px;text-align:center;}
.price-box .lbl{font-size:12px;color:#6b7a96;font-style:italic;}
.price-box .val{font-size:30px;font-weight:800;color:#1e2a3a;margin-top:8px;font-style:italic;}
.deadline-box{background:#fdeeee;border-radius:18px;padding:18px 22px;text-align:center;margin-top:16px;}
.deadline-box .lbl{font-size:12px;color:#c2625b;display:flex;align-items:center;justify-content:center;gap:6px;font-style:italic;}
.deadline-box .val{font-size:18px;font-weight:800;color:#b5352b;margin-top:6px;font-style:italic;}

.equip-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px;}
.equip{display:flex;align-items:center;justify-content:space-between;border:1px solid var(--line-2);
  border-radius:13px;padding:13px 16px;font-size:13.5px;font-weight:700;color:var(--ink);}
.equip.off{color:#b6bfce;background:#fafbfc;}
.equip .yes{color:var(--green);font-size:17px;}
.equip .no{color:#c8d0db;font-size:16px;}

.inspect-card{background:#0c1424;border-radius:18px;padding:22px 24px;color:#fff;margin-top:20px;}
.inspect-card__top{display:flex;align-items:center;justify-content:space-between;}
.inspect-card__top .ttl{display:flex;align-items:center;gap:10px;font-weight:800;font-style:italic;font-size:16px;}
.inspect-card__top .ttl i{color:var(--brand-red);font-size:20px;}
.inspect-metrics{display:flex;gap:26px;}
.inspect-metrics .m{text-align:right;}
.inspect-metrics .m .k{font-size:10px;color:#7b88a0;letter-spacing:1px;}
.inspect-metrics .m .v{font-size:20px;font-weight:800;font-style:italic;color:var(--brand-red);}
.inspect-metrics .m .v.white{color:#fff;}
.inspect-card .sub{margin-top:18px;border-top:1px solid rgba(255,255,255,.08);padding-top:14px;}
.inspect-card .sub .k{font-size:11px;color:#7b88a0;font-style:italic;}
.inspect-card .sub .v{font-size:15px;font-weight:700;margin-top:3px;}

.thumb-strip{display:flex;gap:10px;margin-top:16px;align-items:center;}
.thumb-tab{display:flex;align-items:center;gap:7px;background:var(--navy);color:#fff;border-radius:11px;
  padding:9px 15px;font-size:12.5px;font-weight:700;}
.thumb-tab .cnt{background:var(--brand-red);color:#fff;border-radius:20px;min-width:18px;height:18px;
  font-size:10px;display:flex;align-items:center;justify-content:center;padding:0 5px;}
.thumb-tab.off{background:#fff;color:var(--muted);border:1px solid var(--line-2);}
.thumb-tab.off .cnt{background:#e7ebf2;color:#7b88a0;}
.hero-photo{aspect-ratio:4/3;border-radius:18px;overflow:hidden;position:relative;
  background:linear-gradient(135deg,#2a3344,#0f1726);display:flex;align-items:center;justify-content:center;}
.hero-photo i{font-size:72px;color:rgba(255,255,255,.22);}
.hero-photo .expand{position:absolute;right:14px;bottom:14px;width:48px;height:48px;border-radius:14px;
  background:rgba(13,20,38,.78);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;}
.gallery{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:14px;}
.gthumb{aspect-ratio:5/4;border-radius:11px;background:linear-gradient(135deg,#cdd6e3,#aab6c8);
  display:flex;align-items:center;justify-content:center;color:#8794a8;}
.gthumb i{font-size:20px;}
.gthumb.sel{outline:2px solid var(--brand-red);outline-offset:2px;}

/* assessment tab */
.assess-grid{display:grid;grid-template-columns:1fr 320px;gap:24px;align-items:start;}
.assess-input{background:#f5f7fb;border:1px solid #e7ebf2;border-radius:16px;padding:22px 24px;}
.assess-input .lbl{font-size:12px;color:var(--muted);font-style:italic;}
.assess-input .big{font-size:34px;font-weight:800;color:var(--ink);font-style:italic;margin-top:6px;
  display:flex;align-items:center;gap:10px;}
.assess-input .big span.yen{color:#9aa6ba;font-weight:600;}
.assess-side{display:flex;flex-direction:column;gap:18px;}
.side-dark{background:#0c1424;border-radius:18px;padding:20px;color:#fff;}
.side-dark .top-ic{width:48px;height:48px;border-radius:14px;background:var(--brand-red);
  display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 8px;}
.side-dark .center{text-align:center;}
.side-row{text-align:center;margin-top:14px;}
.side-row .k{font-size:11px;color:#7b88a0;font-style:italic;}
.side-row .v{font-size:20px;font-weight:800;font-style:italic;margin-top:4px;}
.side-row .v.green{color:#34d27b;}
.side-row .v.red{color:var(--brand-red);}
.assess-table{margin-top:18px;font-size:12px;}
.assess-table .h{display:grid;grid-template-columns:1.3fr 1fr .8fr 1.2fr 1fr;color:var(--muted);
  font-style:italic;padding-bottom:10px;border-bottom:1px solid var(--line);}
.assess-table .r{display:grid;grid-template-columns:1.3fr 1fr .8fr 1.2fr 1fr;padding-top:12px;font-weight:700;color:var(--ink);}
.assess-table .r .blue{color:var(--blue);}

/* ============================ CHAT MODAL ============================ */
.modal-overlay{position:fixed;inset:0;background:rgba(8,12,22,.55);backdrop-filter:blur(2px);
  display:flex;align-items:center;justify-content:center;z-index:100;padding:30px;}
.chat-modal{width:800px;max-width:96vw;height:760px;max-height:92vh;background:#fff;border-radius:22px;
  overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow-pop);}
.chat-head{background:#0c1322;color:#fff;padding:18px 22px;}
.chat-head__top{display:flex;align-items:flex-start;justify-content:space-between;}
.chat-head h3{margin:0;font-size:18px;font-weight:800;font-style:italic;}
.chat-head .mode{color:var(--brand-red);font-size:11px;font-weight:700;font-style:italic;margin-top:4px;letter-spacing:.5px;}
.chat-close{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.08);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:20px;}
.chat-close:hover{background:rgba(255,255,255,.16);}
.chat-parties{display:flex;justify-content:space-between;font-size:12px;color:#9aa6ba;margin-top:14px;}
.chat-parties .p{display:flex;align-items:center;gap:7px;}
.chat-veh{background:#0c1322;color:#fff;padding:0 22px 16px;display:flex;align-items:center;gap:12px;}
.chat-veh .vthumb{width:42px;height:42px;border-radius:10px;background:#fff;display:flex;
  align-items:center;justify-content:center;color:#9aa6b8;font-size:18px;}
.chat-veh .vt{font-size:14px;font-weight:800;font-style:italic;}
.chat-veh .vp{font-size:13px;color:var(--brand-red);font-weight:700;}
.online{margin-left:auto;background:#0f6b3f;color:#5ff0a0;font-size:11px;font-weight:700;
  padding:4px 12px;border-radius:20px;}
.chat-body{flex:1;background:#fafbfc;padding:24px;overflow-y:auto;}
.chat-day{text-align:center;color:#aab3c2;font-size:12px;margin:6px 0 22px;position:relative;}
.chat-day::before,.chat-day::after{content:"";position:absolute;top:50%;width:34%;height:1px;background:var(--line-2);}
.chat-day::before{left:0;}.chat-day::after{right:0;}
.msg{display:flex;gap:10px;justify-content:flex-end;margin-bottom:16px;}
.msg__meta{text-align:right;}
.msg__name{font-size:12px;color:var(--ink-soft);font-style:italic;font-weight:700;display:flex;align-items:center;gap:7px;justify-content:flex-end;}
.role-pill{background:#fde2e0;color:var(--brand-red);font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;}
.bubble{background:#fde2e0;color:#3a2422;border-radius:16px;padding:12px 16px;font-size:14px;font-weight:600;margin-top:7px;display:inline-block;}
.msg__time{font-size:10px;color:#aab3c2;margin-top:5px;}
.msg__av{width:34px;height:34px;border-radius:50%;background:#fde2e0;color:var(--brand-red);
  display:flex;align-items:center;justify-content:center;font-size:16px;flex:none;}
.chat-foot{padding:18px 22px;background:#fff;border-top:1px solid var(--line);}
.chat-foot .lock{background:#f1f4f8;border-radius:14px;padding:15px;text-align:center;color:#8794a8;font-size:13px;}

/* AF inspect */
.af-pts{font-size:13px;font-weight:700;}
.af-pts .g{color:var(--green);}
.af-pts .b{color:var(--brand-red);}
.af-pts .u{color:var(--amber);}
.af-pts .n{color:var(--muted);}
.af-pts small{display:block;font-size:10px;color:var(--muted);font-weight:600;margin-top:3px;font-style:italic;}

/* ============================ STORE ADMIN ============================ */
/* login role toggle */
.role-toggle{display:flex;gap:6px;background:#f1f4f8;border-radius:14px;padding:5px;margin-bottom:24px;}
.role-toggle button{flex:1;padding:11px 8px;border-radius:10px;font-weight:700;font-size:13px;color:#94a1b6;font-style:italic;transition:background .15s,color .15s;}
.role-toggle button.on{background:#0c1322;color:#fff;}

/* 5-up KPI + category cards */
.kpi-grid.five{grid-template-columns:repeat(5,1fr);}
.kpi.acc-green{border-left:4px solid var(--green);}
.kpi.acc-red{border-left:4px solid var(--brand-red);}
.kpi__cat{font-size:11px;color:var(--brand-red);font-style:italic;font-weight:700;margin-bottom:6px;}
.ico-red{background:#fdecea;color:var(--brand-red);}

/* dashboard activity columns */
.store-cols{display:grid;grid-template-columns:1fr 1fr;gap:26px;align-items:start;margin-top:8px;}
.act-head{display:flex;align-items:center;gap:11px;font-style:italic;font-weight:800;font-size:17px;color:var(--ink);margin:30px 0 15px;}
.act-ic{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex:none;}
.act-ic.blue{background:#e8f0fe;color:#2f6fed;}
.act-ic.red{background:#fdecea;color:var(--brand-red);}
.panel-row{display:flex;align-items:center;justify-content:space-between;}
.link-blue{color:var(--blue);font-weight:700;font-size:13px;}
.link-blue:hover{text-decoration:underline;}
.act-empty{height:120px;display:flex;align-items:center;justify-content:center;color:#c4ccd8;font-style:italic;letter-spacing:2px;font-size:13px;}
.li-row{display:flex;align-items:center;gap:14px;padding:14px 2px;border-bottom:1px solid var(--line);}
.li-row:last-child{border-bottom:none;}
.li-inq{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;font-style:italic;white-space:nowrap;}
.li-inq i{font-size:15px;}
.dashed-btn{width:100%;border:1.5px dashed #cfd6e0;border-radius:13px;padding:14px;color:#94a1b6;font-weight:700;
  font-size:13px;margin-top:16px;display:flex;align-items:center;justify-content:center;gap:8px;background:#fafbfc;transition:border-color .15s,color .15s;}
.dashed-btn:hover{border-color:var(--brand-red);color:var(--brand-red);}
.legend{display:flex;gap:18px;}
.legend .lg{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--ink-soft);font-weight:600;}
.perf-empty{height:180px;margin-top:20px;position:relative;}
.perf-empty span{position:absolute;left:0;right:0;border-top:1.5px dashed var(--line-2);}
.perf-empty span:nth-child(1){top:34%;}
.perf-empty span:nth-child(2){top:67%;}

/* empty states */
.empty-big{padding:72px 20px;text-align:center;}
.empty-ic{font-size:60px;color:#e4e8ef;}
.empty-title{color:#aab3c2;font-style:italic;margin-top:14px;font-size:15px;font-weight:600;}
.empty-sub{color:#aab3c2;font-size:13px;font-style:italic;margin-top:6px;}
.empty-link{color:var(--brand-red);font-weight:700;font-style:italic;display:inline-flex;align-items:center;gap:8px;margin-top:22px;cursor:pointer;}
.empty-link:hover{text-decoration:underline;}

/* info box */
.info-box{display:flex;gap:14px;background:var(--blue-bg);border-radius:16px;padding:18px 22px;margin-top:22px;}
.info-ic{width:40px;height:40px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;flex:none;font-size:18px;}
.info-box .t{font-style:italic;font-weight:700;color:var(--ink);font-size:14px;}
.info-box .b{font-size:12.5px;color:var(--ink-soft);font-style:italic;margin-top:6px;line-height:1.75;}

/* inventory */
.imgnf{width:64px;height:46px;border-radius:9px;background:#f1f4f8;display:flex;flex-direction:column;
  align-items:center;justify-content:center;color:#c4ccd8;font-size:8px;font-weight:700;gap:2px;line-height:1.2;text-align:center;}
.imgnf i{font-size:17px;}
.btn-orange{background:#f97316;color:#fff;box-shadow:0 12px 22px -12px rgba(249,115,22,.8);}
.btn-orange:hover{background:#ea6a0c;}
.step-badge{display:inline-block;background:var(--amber-bg);color:var(--amber);font-size:10px;font-weight:800;
  font-style:italic;padding:3px 11px;border-radius:7px;margin-top:7px;letter-spacing:.5px;}
.status-select.draft select{background:#eef1f6;color:#5b6679;}
.status-select.draft::after{color:#5b6679;}
.del-btn{width:38px;height:38px;border-radius:10px;border:1px solid #f3c2bd;color:var(--brand-red);
  display:flex;align-items:center;justify-content:center;font-size:17px;transition:background .12s;}
.del-btn:hover{background:#fdeeec;}
.eye-btn{width:38px;height:38px;border-radius:10px;background:#f1f4f8;color:#aab3c2;
  display:flex;align-items:center;justify-content:center;font-size:17px;transition:background .12s,color .12s;}
.eye-btn:hover{background:#e7ebf2;color:#64708a;}

/* favorites controls */
.fav-controls{display:flex;gap:12px;}
.sort-dark{background:var(--navy);color:#fff;border-radius:12px;padding:11px 20px;font-weight:700;
  font-size:13px;display:flex;align-items:center;gap:8px;}
.sort-dark i{font-size:15px;}
.watch-badge{background:#fff;border:1px solid var(--line-2);border-radius:12px;padding:11px 18px;
  font-size:13px;font-weight:700;color:var(--muted);font-style:italic;display:flex;align-items:center;}

@media (max-width:1280px){
  .kpi-grid.five{grid-template-columns:repeat(3,1fr);}
}
@media (max-width:1200px){
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  .chart-2col,.store-cols{grid-template-columns:1fr;}
  .filter-row{grid-template-columns:repeat(3,1fr);}
}

/* ============================ REGISTER WIZARD ============================ */
.wz-overlay{position:fixed;inset:0;background:rgba(6,10,20,.62);backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;z-index:120;padding:22px;}
.wz-modal{width:1320px;max-width:97vw;height:94vh;background:#fbfcfd;border-radius:30px;overflow:hidden;
  display:flex;flex-direction:column;box-shadow:0 40px 90px -28px rgba(0,0,0,.6);}
.wz-head{background:linear-gradient(100deg,#0a1020,#0c1322 60%,#0e1526);padding:16px 22px;
  display:flex;align-items:center;gap:18px;position:relative;flex:none;}
.wz-plus{width:46px;height:46px;border-radius:14px;background:var(--brand-red);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:30px;flex:none;box-shadow:0 10px 22px -10px rgba(238,49,36,.8);}
.wz-titlewrap{flex:1;min-width:0;}
.wz-title{font-style:italic;font-weight:800;color:#fff;font-size:21px;letter-spacing:.4px;}
.wz-title em{color:var(--brand-red);font-style:italic;}
.wz-progress{display:flex;align-items:center;gap:14px;margin-top:9px;}
.wz-track{width:260px;max-width:42vw;height:4px;background:rgba(255,255,255,.12);border-radius:4px;overflow:hidden;}
.wz-fill{height:100%;background:var(--brand-red);border-radius:4px;transition:width .35s cubic-bezier(.4,0,.2,1);}
.wz-step-lbl{font-size:11px;color:#7c8698;letter-spacing:3px;font-weight:600;white-space:nowrap;}
.wz-close{width:42px;height:42px;border-radius:12px;background:#222b3d;color:#cbd3e0;display:flex;
  align-items:center;justify-content:center;font-size:22px;flex:none;transition:background .15s;}
.wz-close:hover{background:#303c52;color:#fff;}

.wz-body{flex:1;overflow-y:auto;padding:40px 48px 44px;}
.wz-step-head{text-align:center;margin-bottom:30px;}
.wz-step-head h2{margin:0;font-style:italic;font-weight:800;font-size:26px;color:#1a2236;letter-spacing:.5px;}
.wz-step-head p{margin:9px 0 0;color:#9aa6ba;font-size:13.5px;letter-spacing:1px;}

.wz-foot{flex:none;background:#fff;border-top:1px solid var(--line);padding:16px 32px;
  display:flex;align-items:center;gap:14px;}
.wz-foot .spacer{flex:1;}
.wz-btn{display:inline-flex;align-items:center;gap:9px;border-radius:14px;font-weight:700;font-size:14px;
  padding:14px 26px;font-style:italic;transition:background .15s,transform .1s,opacity .15s;}
.wz-btn:active{transform:translateY(1px);}
.wz-btn-light{background:#fff;border:1px solid var(--line-2);color:#46536b;}
.wz-btn-light:hover{background:#f6f8fb;}
.wz-btn-ghost{background:#fff;border:1px solid var(--line);color:#b3bdcc;}
.wz-btn-ghost:hover{color:#64708a;background:#f8fafc;}
.wz-btn-dark{background:#0c1322;color:#fff;box-shadow:0 14px 26px -14px rgba(12,19,34,.8);}
.wz-btn-dark:hover{background:#18233c;}
.wz-foot .wz-btn-finish{background:#f4a8a2;color:#fff;cursor:default;box-shadow:none;}

/* wizard cards & fields */
.wz-card{background:#fff;border:1px solid #eef1f5;border-radius:22px;padding:26px 30px;box-shadow:0 1px 2px rgba(16,24,40,.03);}
.wz-card+.wz-card{margin-top:22px;}
.wz-card-lbl{font-size:12.5px;font-weight:700;font-style:italic;letter-spacing:1px;color:#46536b;margin-bottom:18px;text-transform:uppercase;}
.wz-card-lbl.jp{text-transform:none;letter-spacing:0;font-size:14px;}
.wz-card-lbl .req{color:var(--brand-red);margin-left:4px;}
.wz-field label{display:block;font-size:12px;color:#8a96aa;margin-bottom:8px;font-style:italic;}
.wz-field label .req{color:var(--brand-red);margin-left:3px;}
.wz-inp{width:100%;height:48px;border:1px solid #e2e7ef;border-radius:12px;background:#fff;padding:0 14px;
  font-size:14px;font-weight:600;color:#1d2738;outline:none;transition:border-color .15s,box-shadow .15s;}
.wz-inp::placeholder{color:#b3bdcc;font-weight:500;}
.wz-inp:focus{border-color:#9fb6e8;box-shadow:0 0 0 3px rgba(47,111,237,.1);}
.wz-inp.locked{background:#eef1f6;color:#7b88a0;border-color:#e6eaf1;}
.wz-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px 22px;}
.wz-grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:20px 22px;}
.wz-grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:20px 22px;}
.wz-sel{position:relative;}
.wz-sel select{width:100%;height:48px;border:1px solid #e2e7ef;border-radius:12px;background:#fff;
  padding:0 38px 0 14px;font-size:14px;font-weight:600;color:#1d2738;appearance:none;cursor:pointer;}
.wz-sel select:disabled,.wz-sel.locked select{background:#eef1f6;color:#7b88a0;}
.wz-sel::after{content:"\\ea5f";font-family:"tabler-icons";position:absolute;right:13px;top:50%;
  transform:translateY(-50%);color:#9aa6ba;pointer-events:none;font-size:15px;}
.wz-stepper::after{content:"\\eacd";}
.wz-check{display:flex;align-items:center;gap:11px;font-size:14px;font-weight:600;color:#46536b;cursor:pointer;}
.wz-check input{appearance:none;width:22px;height:22px;border:1.5px solid #cdd5e2;border-radius:7px;cursor:pointer;
  position:relative;flex:none;transition:background .12s,border-color .12s;}
.wz-check input:checked{background:var(--brand-red);border-color:var(--brand-red);}
.wz-check input:checked::after{content:"\\ea5e";font-family:"tabler-icons";position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;}
.wz-checks{display:flex;gap:40px;flex-wrap:wrap;margin-top:6px;}
.wz-checkgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px 20px;}
.wz-ta{width:100%;min-height:130px;border:1px solid #e2e7ef;border-radius:14px;padding:14px 16px;
  font-size:14px;color:#1d2738;outline:none;resize:vertical;font-family:inherit;}

/* ============================ FORM MODAL (create/edit) ============================ */
.fm-overlay{position:fixed;inset:0;background:rgba(10,16,30,.6);backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;z-index:130;padding:24px;animation:fm-fade .18s ease;}
@keyframes fm-fade{from{opacity:0;}to{opacity:1;}}
.fm-modal{width:620px;max-width:96vw;max-height:92vh;background:#fff;border-radius:26px;overflow:hidden;
  display:flex;flex-direction:column;box-shadow:0 40px 90px -28px rgba(0,0,0,.55);animation:fm-pop .22s cubic-bezier(.34,1.3,.5,1);}
@keyframes fm-pop{from{transform:translateY(14px) scale(.98);opacity:0;}to{transform:none;opacity:1;}}
.fm-head{background:linear-gradient(100deg,#0a1020,#0c1322 60%,#0e1526);padding:20px 26px;
  display:flex;align-items:center;justify-content:space-between;flex:none;}
.fm-head h3{margin:0;color:#fff;font-style:italic;font-weight:800;font-size:18px;letter-spacing:.3px;}
.fm-close{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.08);color:#cbd3e0;
  display:flex;align-items:center;justify-content:center;font-size:21px;transition:background .15s;}
.fm-close:hover{background:rgba(255,255,255,.18);color:#fff;}
.fm-body{padding:30px 36px 34px;overflow-y:auto;}

/* avatar */
.fm-avatar-wrap{display:flex;justify-content:center;margin-bottom:24px;}
.fm-avatar{position:relative;width:96px;height:96px;border-radius:50%;background:#fff;
  box-shadow:0 8px 22px -8px rgba(16,24,40,.3);display:flex;align-items:center;justify-content:center;}
.fm-avatar .face{width:84px;height:84px;border-radius:50%;background:linear-gradient(135deg,#e7ebf2,#d3dae5);
  display:flex;align-items:center;justify-content:center;font-size:40px;color:#8b97aa;overflow:hidden;}
.fm-avatar .refresh{position:absolute;right:-2px;bottom:-2px;width:32px;height:32px;border-radius:50%;
  background:#0c1322;color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;
  border:3px solid #fff;cursor:pointer;transition:transform .3s;}
.fm-avatar .refresh:hover{transform:rotate(180deg);background:#1b2742;}

/* fields */
.fm-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px 20px;margin-bottom:18px;}
.fm-field{display:flex;flex-direction:column;}
.fm-field.full{grid-column:1 / -1;}
.fm-field label{display:flex;align-items:center;gap:7px;font-size:12.5px;color:#64708a;
  font-style:italic;margin-bottom:9px;font-weight:600;}
.fm-field label i{color:var(--brand-red);font-size:15px;}
.fm-inp{width:100%;height:50px;border:1px solid #eceff4;border-radius:13px;background:#f4f6f9;padding:0 15px;
  font-size:14.5px;font-weight:600;color:#1d2738;outline:none;transition:border-color .15s,background .15s,box-shadow .15s;}
.fm-inp::placeholder{color:#b3bdcc;font-weight:600;font-style:italic;}
.fm-inp:focus{border-color:#9fb6e8;background:#fff;box-shadow:0 0 0 3px rgba(47,111,237,.1);}
.fm-pwd{position:relative;}
.fm-pwd .fm-inp{padding-right:46px;}
.fm-pwd .eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#9aa6ba;font-size:19px;cursor:pointer;}
.fm-pwd .eye:hover{color:#64708a;}
.fm-hint{font-size:11.5px;color:#9aa6ba;font-style:italic;margin:-8px 0 18px;}
.fm-sel{position:relative;}
.fm-sel select{width:100%;height:50px;border:1px solid #eceff4;border-radius:13px;background:#f4f6f9;
  padding:0 40px 0 15px;font-size:14.5px;font-weight:600;color:#1d2738;appearance:none;cursor:pointer;outline:none;}
.fm-sel select:focus{border-color:#9fb6e8;background:#fff;}
.fm-sel::after{content:"\\ea5f";font-family:"tabler-icons";position:absolute;right:14px;top:50%;
  transform:translateY(-50%);color:#9aa6ba;pointer-events:none;font-size:16px;}

/* note box */
.fm-note{display:flex;align-items:flex-start;gap:11px;background:#f4f6f9;border-radius:14px;padding:15px 18px;
  font-size:12.5px;color:#64708a;font-style:italic;line-height:1.6;margin-top:6px;}
.fm-note i{color:#aab3c2;font-size:18px;flex:none;margin-top:1px;}
.fm-note.blue{background:#eef4ff;color:#3a5a8a;}
.fm-note.blue i{color:#5b8def;}

/* save button */
.fm-save{width:100%;height:56px;border-radius:15px;margin-top:24px;display:flex;align-items:center;
  justify-content:center;gap:10px;font-style:italic;font-weight:800;font-size:16px;color:#fff;
  transition:background .15s,transform .1s;}
.fm-save:active{transform:translateY(1px);}
.fm-save.dark{background:#0c1322;}
.fm-save.dark:hover{background:#1b2742;}
.fm-save.red{background:var(--brand-red);}
.fm-save.red:hover{background:var(--brand-red-dark);}

@media (max-width:560px){ .fm-grid{grid-template-columns:1fr;} }

/* ============================ USER MENU / PROFILE ============================ */
.usermenu{position:relative;}
.userchip{display:flex;align-items:center;gap:10px;padding:5px 6px;border-radius:12px;background:none;transition:background .12s;}
.userchip:hover{background:var(--line);}
.userchip__txt{text-align:left;}
.um-pop{position:absolute;top:calc(100% + 10px);right:0;width:266px;background:#fff;border:1px solid var(--line);
  border-radius:16px;box-shadow:0 24px 50px -18px rgba(8,15,30,.4);overflow:hidden;z-index:60;
  animation:um-drop .16s ease;}
@keyframes um-drop{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:none;}}
.um-id{padding:22px 20px 16px;text-align:center;border-bottom:1px solid var(--line);}
.um-av{width:56px;height:56px;border-radius:50%;background:#e7ebf2;color:#64708a;font-size:22px;font-weight:700;
  display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
.um-name{font-size:16px;font-weight:800;color:var(--ink);}
.um-sub{font-size:11.5px;color:var(--muted);font-style:italic;margin-top:4px;}
.um-row{display:flex;align-items:center;gap:12px;width:100%;padding:14px 20px;font-size:14px;font-weight:600;
  color:var(--ink-soft);transition:background .12s;}
.um-row:hover{background:#f6f8fb;}
.um-row i{font-size:19px;color:#8b97aa;}
.um-row .um-chev{margin-left:auto;font-size:16px;color:#c4ccd8;}
.um-row.danger{color:var(--brand-red);border-top:1px solid var(--line);}
.um-row.danger i{color:var(--brand-red);}
/* account detail view */
.um-pop.account{width:300px;}
.um-acc-head{background:linear-gradient(100deg,#0a1020,#0c1322 60%,#0e1526);color:#fff;display:flex;align-items:center;
  gap:12px;padding:15px 18px;font-style:italic;font-weight:800;font-size:15px;}
.um-back{width:30px;height:30px;border-radius:9px;background:rgba(255,255,255,.08);color:#cbd3e0;display:flex;
  align-items:center;justify-content:center;font-size:18px;transition:background .15s;}
.um-back:hover{background:rgba(255,255,255,.18);color:#fff;}
.um-acc-body{padding:20px;}
.um-acc-field{margin-bottom:16px;}
.um-acc-field .k{font-size:11px;color:var(--muted);font-style:italic;margin-bottom:5px;}
.um-acc-field .v{font-size:15px;font-weight:700;color:var(--brand-red);font-style:italic;}
.um-acc-note{display:flex;align-items:center;gap:8px;border-top:1px solid var(--line);padding-top:14px;margin-top:4px;
  font-size:12px;color:var(--muted);font-style:italic;}
.um-acc-note i{color:var(--brand-red);font-size:15px;}
.wz-ta:focus{border-color:#9fb6e8;}

/* badges */
.wz-badge{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:800;letter-spacing:.5px;
  padding:5px 11px;border-radius:20px;font-style:italic;}
.wz-badge.green{background:#d6f7e2;color:#108a44;}
.wz-badge.teal{background:#d3f2ef;color:#0c8a7e;}
.wz-ocr-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.wz-ocr-head .lbl{color:var(--brand-red);font-weight:800;font-style:italic;font-size:13px;}
.wz-ocr-head .badges{display:flex;gap:8px;}

/* step2 doc preview */
.wz-2col{display:grid;grid-template-columns:300px 1fr;gap:26px;align-items:start;}
.wz-doc{aspect-ratio:3/4;border:2px dashed #9ad9b3;border-radius:18px;background:#f1faf4;
  display:flex;flex-direction:column;align-items:center;justify-content:center;color:#9aa6ba;gap:10px;overflow:hidden;}
.wz-doc i{font-size:42px;color:#bcc8d6;}
.wz-doc .ocr-lines{width:78%;display:flex;flex-direction:column;gap:7px;margin-top:6px;}
.wz-doc .ocr-lines span{height:6px;background:#d4dde8;border-radius:4px;}
.wz-doc .ocr-lines span:nth-child(2){width:80%;}
.wz-doc .ocr-lines span:nth-child(3){width:90%;}
.wz-doc .ocr-lines span:nth-child(4){width:65%;}
.wz-doc .cap{font-size:11px;font-style:italic;color:#8aa897;}

/* step3 photo cards */
.wz-photogrid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;}
.wz-photo{border:1px solid #eef1f5;border-radius:20px;background:#fff;padding:26px 22px;text-align:center;
  box-shadow:0 1px 2px rgba(16,24,40,.03);transition:border-color .15s,box-shadow .15s;}
.wz-photo:hover{border-color:#d6deea;box-shadow:0 10px 26px -16px rgba(16,24,40,.3);}
.wz-photo .ph{aspect-ratio:16/10;border-radius:14px;background:#f1f4f8;display:flex;align-items:center;
  justify-content:center;color:#c4ccd8;font-size:44px;margin-bottom:16px;}
.wz-photo .nm{font-size:14px;font-weight:700;color:#46536b;margin-bottom:14px;}
.wz-photo.done .ph{background:#eaf7ef;color:#2fae62;}
.wz-shoot{display:inline-flex;align-items:center;gap:7px;background:#0c1322;color:#fff;border-radius:10px;
  padding:9px 18px;font-size:12.5px;font-weight:700;font-style:italic;}
.wz-shoot:hover{background:#18233c;}
.wz-shoot.done{background:#16a34a;}

/* step4 ai photos */
.wz-aigrid{display:grid;grid-template-columns:repeat(5,1fr);gap:18px;}
.wz-aicard{border:1px solid #eef1f5;border-radius:16px;background:#fff;padding:16px 14px;text-align:center;}
.wz-aicard .ph{aspect-ratio:1/1;border-radius:12px;background:#f4f6f9;display:flex;align-items:center;
  justify-content:center;color:#c4ccd8;font-size:30px;margin-bottom:12px;}
.wz-aicard .nm{font-size:11.5px;font-weight:700;color:#46536b;min-height:30px;line-height:1.35;margin-bottom:11px;}
.wz-aicard.done .ph{background:#eaf7ef;color:#2fae62;}
.wz-shoot-sm{display:inline-flex;align-items:center;gap:5px;background:#0c1322;color:#fff;border-radius:9px;
  padding:7px 14px;font-size:11px;font-weight:700;font-style:italic;}
.wz-shoot-sm:hover{background:#18233c;}
.wz-shoot-sm.done{background:#16a34a;}
.wz-ai-count{text-align:center;margin-top:24px;color:#9aa6ba;font-size:13px;font-style:italic;}
.wz-ai-count b{color:var(--brand-red);}

/* step5 inspection */
.wz-toggle{display:flex;background:#eef1f6;border-radius:13px;padding:5px;gap:5px;}
.wz-toggle button{flex:1;padding:11px;border-radius:9px;font-weight:700;font-size:14px;color:#aab3c2;font-style:italic;transition:background .12s,color .12s;}
.wz-toggle button.on{background:#fff;color:#1d2738;box-shadow:0 2px 6px rgba(16,24,40,.08);}
.wz-toggle.danger button.on{color:var(--brand-red);}
.wz-airef{background:#0c1322;border-radius:14px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;}
.wz-airef .v{display:flex;align-items:center;gap:9px;font-weight:800;font-style:italic;color:#fff;font-size:16px;}
.wz-airef .v .dot{width:8px;height:8px;border-radius:50%;background:#34d27b;}
.wz-airef .k{font-size:11px;color:#7b88a0;font-style:italic;}
.wz-report-btn{width:100%;background:var(--brand-red);color:#fff;border-radius:13px;padding:14px;margin-top:12px;
  display:flex;align-items:center;justify-content:space-between;font-weight:700;font-style:italic;font-size:14px;}
.wz-report-btn:hover{background:var(--brand-red-dark);}
.wz-report-btn .l{display:flex;align-items:center;gap:9px;}
.wz-score-lbl{text-align:center;font-style:italic;color:#8a96aa;font-size:13px;margin-bottom:14px;}
.wz-scores{display:flex;justify-content:center;gap:9px;flex-wrap:wrap;}
.wz-score{width:46px;height:42px;border-radius:11px;border:1px solid #e2e7ef;background:#fff;color:#64708a;
  font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .12s;}
.wz-score:hover{border-color:#cdd5e2;}
.wz-score.on{background:var(--brand-red);color:#fff;border-color:var(--brand-red);box-shadow:0 10px 20px -12px rgba(238,49,36,.8);}
.wz-seg{display:flex;background:#eef1f6;border-radius:13px;padding:5px;gap:4px;}
.wz-seg button{flex:1;padding:12px;border-radius:9px;font-weight:700;font-size:14px;color:#aab3c2;transition:all .12s;}
.wz-seg button.on{background:#fff;color:#1d2738;box-shadow:0 2px 6px rgba(16,24,40,.08);}
.wz-upload{width:100%;background:#0c1322;color:#fff;border-radius:14px;padding:16px;display:flex;
  align-items:center;justify-content:center;gap:9px;font-weight:700;font-style:italic;font-size:14px;margin-top:24px;}
.wz-upload:hover{background:#18233c;}

/* step6 valuation */
.wz-val-row{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;align-items:stretch;}
.wz-val{border-radius:22px;padding:24px 26px;border:1px solid #eef1f5;background:#fff;display:flex;flex-direction:column;}
.wz-val .vh{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.wz-val .vh .t{display:flex;align-items:center;gap:9px;font-weight:800;font-style:italic;font-size:15px;color:#1d2738;}
.wz-val .vh .t i{color:var(--brand-red);font-size:18px;}
.wz-val.dark{background:#0a0f1c;border-color:#0a0f1c;color:#fff;position:relative;overflow:hidden;}
.wz-val.dark .t{color:#fff;}
.wz-val.dark::after{content:"査";position:absolute;right:-10px;bottom:-30px;font-size:150px;font-weight:900;
  color:rgba(255,255,255,.03);font-style:italic;pointer-events:none;}
.wz-pull{background:#0c1322;color:#fff;border-radius:10px;padding:8px 14px;font-size:11.5px;font-weight:700;font-style:italic;display:inline-flex;align-items:center;gap:7px;}
.wz-val .vk{font-size:12px;color:#8a96aa;font-style:italic;margin-bottom:10px;}
.wz-val.dark .vk{color:#7b88a0;}
.wz-bigfield{border:1px solid #e2e7ef;border-radius:13px;background:#f7f9fc;padding:14px 18px;font-size:26px;
  font-weight:800;color:#1a2236;font-style:italic;display:flex;align-items:center;gap:8px;}
.wz-bigfield .yen{color:#aab3c2;font-size:20px;}
.wz-range{font-size:27px;font-weight:800;font-style:italic;letter-spacing:.5px;color:#fff;position:relative;z-index:1;}
.wz-market-empty{flex:1;display:flex;align-items:center;justify-content:center;color:#cbd3e0;font-style:italic;font-size:12px;letter-spacing:1px;min-height:120px;}
.wz-final{background:#fff;border:1px solid #eef1f5;border-radius:24px;padding:32px;margin-top:28px;}
.wz-final h3{text-align:center;font-style:italic;font-weight:800;font-size:18px;color:#1a2236;margin:0;letter-spacing:3px;}
.wz-final p.sub{text-align:center;color:#9aa6ba;font-size:12.5px;margin:8px 0 26px;font-style:italic;}
.wz-final-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:24px;align-items:start;}
.wz-assessor{display:flex;align-items:center;gap:13px;border:1px solid #e2e7ef;border-radius:14px;padding:14px 18px;}
.wz-assessor .av{width:42px;height:42px;border-radius:50%;background:#0c1322;color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;flex:none;}
.wz-assessor .k{font-size:11px;color:#8a96aa;font-style:italic;}
.wz-assessor .v{font-size:15px;font-weight:800;color:#1d2738;font-style:italic;}

/* step7 listing */
.wz-7col{display:grid;grid-template-columns:1fr 1fr;gap:26px;align-items:start;}
.wz-listcard{background:#fff;border:1px solid #eef1f5;border-radius:22px;padding:26px 28px;}
.wz-listcard .h{display:flex;align-items:center;gap:9px;font-weight:800;font-style:italic;font-size:15px;color:#1d2738;margin-bottom:18px;}
.wz-listcard .h i{color:var(--brand-red);font-size:18px;}
.wz-datefield{display:flex;align-items:center;justify-content:space-between;border:1px solid #e2e7ef;border-radius:13px;
  background:#f7f9fc;padding:16px 18px;font-size:16px;font-weight:800;color:#1a2236;font-style:italic;}
.wz-datefield i{color:#9aa6ba;}
.wz-note{background:#f4f6f9;border-radius:13px;padding:15px 18px;font-size:12px;color:#8a96aa;font-style:italic;line-height:1.7;margin-top:16px;}
.wz-info-blue{background:#eef4ff;border:1px solid #dde8fb;border-radius:18px;padding:18px 22px;margin-top:22px;}
.wz-info-blue .t{display:flex;align-items:center;gap:9px;font-weight:700;font-style:italic;color:#1d2738;font-size:14px;}
.wz-info-blue .t i{color:var(--blue);}
.wz-info-blue ul{margin:12px 0 0;padding-left:18px;color:#46536b;font-size:12px;font-style:italic;line-height:2;}
.wz-info-blue ul li:last-child{color:var(--brand-red);}
.wz-sim{background:#0a0f1c;border-radius:22px;padding:26px 28px;color:#fff;}
.wz-sim .h{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.wz-sim .h .t{display:flex;align-items:center;gap:9px;font-weight:800;font-style:italic;color:var(--brand-red);font-size:15px;}
.wz-sim .h .cc{font-size:10px;color:#7b88a0;letter-spacing:2px;font-weight:700;}
.wz-sim-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;}
.wz-sim-row .k{font-size:12px;color:#7b88a0;font-style:italic;}
.wz-sim-row .v{font-size:15px;font-weight:800;font-style:italic;}
.wz-sim-price{border:1px solid rgba(255,255,255,.12);border-radius:14px;background:rgba(255,255,255,.04);
  padding:16px 18px;font-size:24px;font-weight:800;color:#fff;font-style:italic;display:flex;align-items:center;gap:8px;margin:6px 0 18px;}
.wz-sim-price .yen{color:#5b6679;font-size:18px;}
.wz-sim-profit{display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(255,255,255,.08);padding-top:16px;}
.wz-sim-profit .lbl{font-size:11px;color:#7b88a0;font-style:italic;}
.wz-sim-profit .amt{font-size:24px;font-weight:800;color:#34d27b;font-style:italic;}
.wz-sim-profit .rate{font-size:11px;color:#7b88a0;font-style:italic;text-align:right;}
.wz-info-orange{background:#fff6ec;border:1px solid #fce4c8;border-radius:16px;padding:16px 20px;margin-top:16px;
  display:flex;gap:11px;font-size:12px;color:#a36b2a;font-style:italic;line-height:1.7;}
.wz-info-orange i{color:#e08a2b;font-size:18px;flex:none;}

@media (max-width:1100px){
  .wz-aigrid{grid-template-columns:repeat(3,1fr);}
  .wz-val-row{grid-template-columns:1fr;}
  .wz-7col,.wz-final-grid,.wz-2col{grid-template-columns:1fr;}
}

/* ============================ ELECTRONIC CONTRACTS ============================ */
/* type icon chip */
.ec-type{display:flex;align-items:center;gap:11px;}
.ec-type-ic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex:none;}
.ec-type .nm{font-weight:700;font-style:italic;color:var(--ink);font-size:14px;white-space:nowrap;}
.ec-type .sb{font-size:11px;color:var(--muted);margin-top:2px;}

/* status pills */
.ec-status{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;font-style:italic;
  padding:6px 13px;border-radius:20px;white-space:nowrap;}
.ec-status i{font-size:14px;}
.st-draft{background:#eef1f6;color:#5b6679;}
.st-review{background:#f3ecff;color:#7c3aed;}
.st-await{background:#fff4e2;color:#d97706;}
.st-partial{background:#eef4ff;color:#2563eb;}
.st-done{background:#dcfce7;color:#16a34a;}

.ec-serial{font-family:"SFMono-Regular",ui-monospace,monospace;font-size:13px;font-weight:700;color:var(--ink);letter-spacing:.3px;}
.ec-retention{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;color:var(--muted);font-style:italic;margin-top:4px;}

/* type-select cards (wizard step 1) */
.ec-typegrid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;}
.ec-typecard{border:1.5px solid #e7ebf2;border-radius:18px;padding:22px 24px;cursor:pointer;display:flex;
  gap:16px;align-items:flex-start;transition:border-color .15s,box-shadow .15s,background .15s;background:#fff;}
.ec-typecard:hover{border-color:#cdd5e2;box-shadow:0 10px 28px -18px rgba(16,24,40,.35);}
.ec-typecard.on{border-color:var(--brand-red);background:#fffafa;box-shadow:0 14px 30px -18px rgba(238,49,36,.4);}
.ec-typecard .big-ic{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:25px;flex:none;}
.ec-typecard h4{margin:0;font-size:16px;font-weight:800;font-style:italic;color:var(--ink);}
.ec-typecard p{margin:6px 0 0;font-size:12px;color:var(--muted);line-height:1.6;}
.ec-typecard .chk{margin-left:auto;width:24px;height:24px;border-radius:50%;border:2px solid #dce2eb;flex:none;
  display:flex;align-items:center;justify-content:center;color:#fff;transition:background .15s,border-color .15s;}
.ec-typecard.on .chk{background:var(--brand-red);border-color:var(--brand-red);}

/* assessment source picker */
.ec-assess{display:flex;align-items:center;gap:16px;border:1.5px solid #e7ebf2;border-radius:15px;padding:16px 20px;cursor:pointer;transition:border-color .15s,background .15s;}
.ec-assess:hover{border-color:#cdd5e2;background:#fafbfc;}
.ec-assess.on{border-color:var(--brand-red);background:#fffafa;}
.ec-assess .av{width:46px;height:46px;border-radius:12px;background:#0c1322;color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;flex:none;}
.ec-assess .meta{flex:1;}
.ec-assess .meta .t{font-weight:800;font-style:italic;color:var(--ink);font-size:15px;}
.ec-assess .meta .s{font-size:12px;color:var(--muted);margin-top:3px;}
.ec-assess .amt{font-size:18px;font-weight:800;font-style:italic;color:var(--ink);}
.ec-assess .badge-ok{font-size:10px;font-weight:700;color:var(--green);background:var(--green-bg);padding:3px 9px;border-radius:6px;font-style:italic;}

/* declaration checklist */
.ec-decl{display:flex;align-items:center;justify-content:space-between;border:1px solid #eef1f5;border-radius:13px;padding:13px 16px;background:#fff;}
.ec-decl .left{display:flex;align-items:center;gap:12px;}
.ec-decl .nm{font-weight:700;font-size:14px;color:var(--ink);}
.ec-decl .ai{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-style:italic;padding:3px 9px;border-radius:7px;}
.ec-decl .ai.ok{background:var(--green-bg);color:var(--green);}
.ec-decl .ai.warn{background:#fff4e2;color:#d97706;}
.ec-decl .ai-src{font-size:10px;color:#9aa6ba;font-style:italic;margin-left:8px;}
.ec-seg2{display:flex;background:#eef1f6;border-radius:10px;padding:4px;gap:4px;}
.ec-seg2 button{padding:7px 16px;border-radius:7px;font-weight:700;font-size:12.5px;color:#aab3c2;font-style:italic;transition:all .12s;}
.ec-seg2 button.on{background:#fff;color:var(--ink);box-shadow:0 1px 4px rgba(16,24,40,.1);}
.ec-seg2 button.on.no{color:var(--green);}
.ec-seg2 button.on.yes{color:var(--brand-red);}

/* required docs grid */
.ec-docgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}

/* payment breakdown */
.ec-pay{border:1px solid #eef1f5;border-radius:16px;overflow:hidden;}
.ec-pay-row{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;border-bottom:1px solid #f1f4f8;font-size:14px;}
.ec-pay-row:last-child{border-bottom:none;}
.ec-pay-row .k{color:var(--ink-soft);font-weight:600;display:flex;align-items:center;gap:8px;}
.ec-pay-row .v{font-weight:700;font-style:italic;color:var(--ink);}
.ec-pay-row.minus .v{color:var(--brand-red);}
.ec-pay-row.total{background:#0c1322;color:#fff;}
.ec-pay-row.total .k{color:#cbd3e0;}
.ec-pay-row.total .v{color:#fff;font-size:20px;}
.ec-defer{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-style:italic;color:#d97706;background:#fff4e2;padding:3px 9px;border-radius:7px;}

/* HQ internal two-tier (A16) */
.ec-internal{border:1.5px dashed #cfd6e0;border-radius:16px;padding:20px 22px;background:#fafbfc;margin-top:18px;}
.ec-internal .hd{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;font-style:italic;color:#64708a;margin-bottom:16px;}
.ec-internal .hd .lock{margin-left:auto;font-size:10px;color:#9aa6ba;background:#eef1f6;padding:3px 10px;border-radius:6px;}

/* terms agreement box */
.ec-terms{border:1px solid #e7ebf2;border-radius:16px;background:#fff;max-height:230px;overflow-y:auto;padding:22px 24px;font-size:12.5px;color:var(--ink-soft);line-height:1.9;}
.ec-terms h5{margin:0 0 4px;font-size:13px;font-weight:800;color:var(--ink);font-style:italic;}
.ec-terms p{margin:0 0 14px;}
.ec-jpuc{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);font-style:italic;margin-top:12px;}

/* e-sign method */
.ec-signpick{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.ec-signopt{border:1.5px solid #e7ebf2;border-radius:14px;padding:18px;cursor:pointer;text-align:center;transition:all .15s;}
.ec-signopt:hover{border-color:#cdd5e2;}
.ec-signopt.on{border-color:var(--brand-red);background:#fffafa;}
.ec-signopt i{font-size:26px;color:var(--brand-red);}
.ec-signopt .t{font-weight:700;font-style:italic;margin-top:8px;font-size:14px;color:var(--ink);}
.ec-signopt .s{font-size:11px;color:var(--muted);margin-top:4px;}

/* ===== contract detail page ===== */
.ec-detail-grid{display:grid;grid-template-columns:1fr 380px;gap:26px;align-items:start;}
/* document preview (paper look) */
.ec-paper{background:#fff;border:1px solid #e4e8ef;border-radius:14px;box-shadow:0 4px 24px -12px rgba(16,24,40,.25);overflow:hidden;}
.ec-paper-band{background:#0c1322;color:#fff;padding:18px 26px;display:flex;align-items:center;justify-content:space-between;}
.ec-paper-band .ttl{font-style:italic;font-weight:800;font-size:18px;}
.ec-paper-band .meta{text-align:right;font-size:11px;color:#9aa6ba;font-style:italic;}
.ec-paper-body{padding:30px 34px;}
.ec-sec{margin-bottom:26px;}
.ec-sec-h{font-size:12px;font-weight:800;font-style:italic;letter-spacing:1px;color:var(--brand-red);text-transform:uppercase;
  border-bottom:2px solid #f1f4f8;padding-bottom:8px;margin-bottom:16px;}
.ec-kv{display:grid;grid-template-columns:1fr 1fr;gap:13px 28px;}
.ec-kv.three{grid-template-columns:repeat(3,1fr);}
.ec-kv .row{display:flex;flex-direction:column;gap:3px;}
.ec-kv .row .k{font-size:10.5px;color:var(--muted);font-style:italic;}
.ec-kv .row .v{font-size:14px;font-weight:700;color:var(--ink);}
.ec-chk-list{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.ec-chk-item{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--ink-soft);font-weight:600;}
.ec-chk-item i{font-size:17px;color:var(--green);}
.ec-chk-item .x{color:#c8d0db;}
.ec-sign-blocks{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:8px;}
.ec-sign-box{border:1px solid #e4e8ef;border-radius:12px;padding:16px 18px;}
.ec-sign-box .role{font-size:10.5px;color:var(--muted);font-style:italic;}
.ec-sign-box .who{font-size:15px;font-weight:800;font-style:italic;color:var(--ink);margin-top:4px;}
.ec-sign-mark{margin-top:12px;height:54px;border-radius:9px;border:1px dashed #d4dde8;display:flex;align-items:center;justify-content:center;
  font-style:italic;font-size:12px;color:#aab3c2;gap:7px;}
.ec-sign-mark.signed{border-style:solid;border-color:#bfe6cd;background:#f3fbf6;color:#16a34a;font-weight:700;}

/* right rail */
.ec-rail{display:flex;flex-direction:column;gap:20px;}
.ec-rail-card{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow-card);padding:22px 24px;}
.ec-rail-card h4{margin:0 0 18px;font-size:14px;font-weight:800;font-style:italic;color:var(--ink);display:flex;align-items:center;gap:9px;}
.ec-rail-card h4 i{color:var(--brand-red);}
/* timeline */
.ec-tl{position:relative;padding-left:8px;}
.ec-tl-item{position:relative;padding-left:30px;padding-bottom:22px;}
.ec-tl-item:last-child{padding-bottom:0;}
.ec-tl-item::before{content:"";position:absolute;left:8px;top:22px;bottom:-2px;width:2px;background:#e7ebf2;}
.ec-tl-item:last-child::before{display:none;}
.ec-tl-dot{position:absolute;left:0;top:1px;width:18px;height:18px;border-radius:50%;background:#fff;border:2px solid #d4dde8;
  display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;}
.ec-tl-item.done .ec-tl-dot{background:var(--green);border-color:var(--green);}
.ec-tl-item.active .ec-tl-dot{background:var(--brand-red);border-color:var(--brand-red);}
.ec-tl-item.done .ec-tl-dot::after,.ec-tl-item.active .ec-tl-dot::after{content:"\\ea5e";font-family:"tabler-icons";}
.ec-tl-item.active .ec-tl-dot::after{content:"";width:6px;height:6px;border-radius:50%;background:#fff;}
.ec-tl .t{font-size:13.5px;font-weight:700;color:var(--ink);}
.ec-tl-item.pending .t{color:#aab3c2;}
.ec-tl .s{font-size:11px;color:var(--muted);font-style:italic;margin-top:2px;}
/* esign info */
.ec-esign-line{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--ink-soft);padding:9px 0;border-bottom:1px solid #f1f4f8;}
.ec-esign-line:last-child{border-bottom:none;}
.ec-esign-line i{font-size:17px;color:#9aa6ba;width:20px;text-align:center;}
.ec-esign-line b{margin-left:auto;color:var(--ink);font-weight:700;font-style:italic;}
.ec-note-amber{background:#fff8ee;border:1px solid #fce4c8;border-radius:13px;padding:14px 16px;display:flex;gap:10px;
  font-size:11.5px;color:#a36b2a;font-style:italic;line-height:1.7;}
.ec-note-amber i{color:#e08a2b;font-size:17px;flex:none;}
.ec-copy-toggle{display:flex;background:#eef1f6;border-radius:10px;padding:4px;gap:4px;}
.ec-copy-toggle button{flex:1;padding:8px;border-radius:7px;font-size:12px;font-weight:700;font-style:italic;color:#aab3c2;}
.ec-copy-toggle button.on{background:#fff;color:var(--ink);box-shadow:0 1px 4px rgba(16,24,40,.1);}

@media (max-width:1200px){
  .ec-detail-grid{grid-template-columns:1fr;}
  .ec-typegrid{grid-template-columns:1fr;}
  .ec-docgrid{grid-template-columns:repeat(2,1fr);}
}

    if (!window.Chart) return;
    const labels = ["05/12","05/15","05/18","05/21","05/24","05/27","05/30","06/02","06/05","06/10"];
    const line = new Chart(lineRef.current, {
      type:"line",

        backgroundColor:"rgba(238,49,36,.08)", fill:true, tension:.45, pointRadius:0, borderWidth:2 }] },

        scales:{ y:{beginAtZero:true,max:4,ticks:{stepSize:1,color:"#9aa6ba"},grid:{color:"#eef1f5"},border:{display:false}},

      options:{ responsive:true, maintainAspectRatio:false, cutout:"68%",
        plugins:{ legend:{display:false} } }

    return ()=>{ line.destroy(); donut.destroy(); };

  const kpis = [

      <div className="chart-2col">

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div className="panel__title jp">日別検査数</div>

        </div>
        <div className="panel">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div className="panel__title jp">ステータス内訳</div>

          <div style={{display:"flex",gap:24,justifyContent:"center",marginTop:14,fontSize:13}}>

            <span><span className="dot" style={{background:"#3b82f6",marginRight:7}}></span>処理中</span>
            <span><span className="dot" style={{background:"#22c55e",marginRight:7}}></span>完了</span>

function ContractWizard({ onClose, go }) {
  const role = sessionStorage.getItem("af_role") || "hq";

  const total = 7;
  const cur = ECW_STEPS[step-1];
  const Body = cur.body;
  const last = step === total;
  const canFinish = st.agreed;

  const next = ()=>{ if(step<total){ setStep(step+1); const b=document.querySelector(".wz-body"); if(b) b.scrollTop=0; } };

    <div className="wz-overlay" onClick={onClose}>
      <div className="wz-modal" onClick={e=>e.stopPropagation()}>

          <div className="wz-plus" style={{fontSize:24}}><i className="ti ti-file-pencil"></i></div>

          </div>

        </div>

        <div className="wz-body">
          <div className="wz-step-head"><h2>{cur.title}</h2><p>{cur.sub}</p></div>
          <Body st={st} set={set} role={role} />
        </div>

        <div className="wz-foot">
          <button className="wz-btn wz-btn-light" onClick={back} style={{visibility:step>1?"visible":"hidden"}}>
            <i className="ti ti-chevron-left"></i>戻る</button>
          <button className="wz-btn wz-btn-ghost"><i className="ti ti-device-floppy"></i>下書き保存</button>
          <div className="spacer"></div>
          {last

                style={canFinish?{background:"var(--brand-red)"}:{}}><i className="ti ti-send"></i>署名を依頼して送信</button>

        </div>
      </div>
    </div>
  );
}

      case "listings":   view = <Inventory />; break;
      case "deals":      view = <NegotiationHistory />; break;
      case "contracts":  view = param ? <ContractDetail no={decodeURIComponent(param)} go={go} role="store" /> : <Contracts go={go} role="store" />; break;
      case "staff":      view = <StoreStaff />; break;
      case "dashboard":
      default:           view = <StoreDashboard go={go} />;
    }
    return <Shell nav={NAV_STORE} title={TITLE.store} user={USER.store} route={route} go={go} connected={!!connected}>{view}</Shell>;
  }

  // HQ
  const connected = base === "vehicles" && param;
  let view;
  switch (base) {
    case "vehicles":    view = param ? <VehicleDetail id={param} go={go} /> : <VehicleList go={go} />; break;
    case "negotiation": view = <Negotiation />; break;
    case "customers":   view = <Customers />; break;
    case "stores":      view = <Stores />; break;
    case "storeusers":  view = <StoreUsers />; break;
    case "admins":      view = <AdminUsers />; break;
    case "review":      view = <MasterReview />; break;
    case "inspect":     view = <AFInspect />; break;
    case "contracts":   view = param ? <ContractDetail no={decodeURIComponent(param)} go={go} role="hq" /> : <Contracts go={go} role="hq" />; break;
    case "dashboard":
    default:            view = <Dashboard />;
  }
  return <Shell nav={NAV_HQ} title={TITLE.hq} user={USER.hq} route={route} go={go} connected={!!connected}>{view}</Shell>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

    "アップルインターアップルインター":"Apple Inter Apple Inter", "黒埼インター店":"Kurosaki Inter Store",
    "LOGIQUE1号店":"LOGIQUE Store 1", "鈴鹿中央通り店":"Suzuka Chuo-dori Store",
    "藤沢辻堂店":"Fujisawa Tsujido Store",
    "山田 太郎":"Yamada Taro", "ヤマダ タロウ":"Yamada Taro", "佐藤 花子":"Sato Hanako",
    "鈴木 一郎":"Suzuki Ichiro", "山田 健一":"Yamada Kenichi", "後藤 俊朗":"Goto Toshiro",
    "テスト":"Test", "テスト 太郎":"Test Taro", "テストアルファード":"Test Alphard",
    "テストスパイク":"Test Spike", "あかさたな":"Akasatana",
    "服部 真也":"Hattori Shinya", "阿部 涼太":"Abe Ryota", "樹木 優太":"Itsuki Yuta",
    "平木 健太郎":"Hiraki Kentaro", "大原":"Ohara", "島津":"Shimazu",
    "髙木 幹也":"Takagi Mikiya", "長橋 優星":"Nagahashi Yusei", "星野 龍史":"Hoshino Ryuji",
    "三重 300 あ 12-34":"Mie 300 A 12-34", "三重 500 さ 56-78":"Mie 500 Sa 56-78",
    "千葉 330 か 90-12":"Chiba 330 Ka 90-12", "湘南 300 あ 12-34":"Shonan 300 A 12-34",
    "三重県四日市市○○町1-2-3":"1-2-3 ○○-cho, Yokkaichi, Mie",
    "令和5年12月1日":"Dec 1, 2023", "令和8年 3月 5日":"Mar 5, 2026", "令和8年12月24日":"Dec 24, 2026",
    "令和8年3月5日":"Mar 5, 2026", "平成22年":"2010", "平成22年12月1日":"Dec 1, 2010", "昭和60年4月1日":"Apr 1, 1985",
    "¥0.0万":"¥0", "¥25万円":"¥250,000", "¥260万円":"¥2,600,000", "¥385万円":"¥3,850,000",
    "¥40万円":"¥400,000", "¥698万":"¥6.98M", "¥705万":"¥7.05M", "594.70万〜687.10万":"5.947M–6.871M",
    "直近 12 件":"Last 12",
    "全":"Total", "件 ・ 法定保管期間 7年 (電子帳簿保存法対応)":"items · 7-yr legal retention (e-bookkeeping compliant)",
    "発行日":"Issued", "メールで署名URLを送付":"Sent signature URL by email",
    "SMSで署名URLを送付":"Sent signature URL by SMS",
  };

  /* substring replacements for proper nouns embedded in composed strings (dates etc.) */
  const SUBSTR = [
    ["アップル本部","Apple HQ"], ["アップル本店","Apple Main Store"],
    ["鈴鹿中央通り店","Suzuka Chuo-dori Store"], ["四日市南店","Yokkaichi South Store"],
    ["流山あおぞら店","Nagareyama Aozora Store"], ["黒埼インター店","Kurosaki Inter Store"],
    [" ・ "," \u00b7 "], ["本部","HQ"]
  ];

  /* state */
  let lang = localStorage.getItem("af_lang") || "ja";
  window.__afLang = lang;
  let paused = false;
  let scheduled = false;
  const orig = new WeakMap();        // textNode -> original JA
  const origAttr = new WeakMap();    // el -> {placeholder, value}

  const SKIP_TAGS = new Set(["SCRIPT","STYLE","NOSCRIPT"]);

  function looksTranslatable(s){
    // must contain a Japanese char; never touch emails
    if(!s) return false;
    if(s.indexOf("@") !== -1) return false;
    return /[ぁ-んァ-ヶ一-龥０-９　]|[、。・（）／％]/.test(s);
  }

  function translateText(raw){
    const t = raw.trim();
    if(!t) return null;
    const hit = DICT[t];
    if(hit === undefined) return null;
    // preserve leading / trailing whitespace
    const lead = raw.match(/^\s*/)[0];
    const trail = raw.match(/\s*$/)[0];
    return lead + hit + trail;
  }

  function substr(raw){
    if(raw.indexOf("@") !== -1) return null;
    let s = raw, changed = false;
    for(const [ja,en] of SUBSTR){ if(s.indexOf(ja) !== -1){ s = s.split(ja).join(en); changed = true; } }
    return changed ? s : null;
  }

  function walk(node){
    if(node.nodeType === Node.TEXT_NODE){
      const parent = node.parentNode;
      if(parent && SKIP_TAGS.has(parent.tagName)) return;
      if(parent && parent.closest && parent.closest("[data-noi18n]")) return;
      if(lang === "en"){
        if(!orig.has(node)) {
          const tr = translateText(node.nodeValue);
          if(tr !== null){ orig.set(node, node.nodeValue); node.nodeValue = tr; }
          else { const sub = substr(node.nodeValue); if(sub !== null){ orig.set(node, node.nodeValue); node.nodeValue = sub; } }
        } else {
          // node already tracked; if React reset it to JA, retranslate
          const tr = translateText(node.nodeValue);
          if(tr !== null && tr !== node.nodeValue){ orig.set(node, node.nodeValue); node.nodeValue = tr; }
          else { const sub = substr(node.nodeValue); if(sub !== null && sub !== node.nodeValue){ orig.set(node, node.nodeValue); node.nodeValue = sub; } }
        }
      }
      return;
    }
    if(node.nodeType !== Node.ELEMENT_NODE) return;
    if(SKIP_TAGS.has(node.tagName)) return;
    if(node.hasAttribute && node.hasAttribute("data-noi18n")) return;

    // attributes: placeholder + readonly value
    if(lang === "en" && (node.tagName === "INPUT" || node.tagName === "TEXTAREA")){
      const ph = node.getAttribute("placeholder");
      if(ph){ const tr = translateText(ph); if(tr!==null){ const o=origAttr.get(node)||{}; if(o.placeholder===undefined){o.placeholder=ph;origAttr.set(node,o);} node.setAttribute("placeholder", tr.trim()); } }
      if(node.readOnly && node.value){ const tr = translateText(node.value); if(tr!==null){ const o=origAttr.get(node)||{}; if(o.value===undefined){o.value=node.value;origAttr.set(node,o);} node.value = tr.trim(); } }
    }
    for(let c = node.firstChild; c; c = c.nextSibling) walk(c);
  }

  function restore(node){
    if(node.nodeType === Node.TEXT_NODE){
      if(orig.has(node)){ node.nodeValue = orig.get(node); orig.delete(node); }
      return;
    }
    if(node.nodeType !== Node.ELEMENT_NODE) return;
    if(origAttr.has(node)){
      const o = origAttr.get(node);
      if(o.placeholder !== undefined) node.setAttribute("placeholder", o.placeholder);
      if(o.value !== undefined) node.value = o.value;
      origAttr.delete(node);
    }
    for(let c = node.firstChild; c; c = c.nextSibling) restore(c);
  }

  function run(){
    paused = true;
    try { walk(document.body); } finally { paused = false; }
  }
  function schedule(){
    if(scheduled) return; scheduled = true;
    setTimeout(()=>{ scheduled = false; if(lang==="en") run(); }, 0);
  }

  const mo = new MutationObserver((muts)=>{
    if(paused || lang !== "en") return;
    schedule();
  });

  function start(){
    mo.observe(document.body, { childList:true, subtree:true, characterData:true });
    if(lang === "en") run();
  }

  window.AF_setLang = function(l){
    if(l === lang) return;
    lang = l; window.__afLang = l; localStorage.setItem("af_lang", l);
    if(l === "ja"){ paused = true; restore(document.body); paused = false; }
    else { run(); }
  };
  window.AF_translate = run;

  if(document.readyState === "loading") document.addEventListener("DOMContentLoaded", start);
  else start();
})();

</script>
